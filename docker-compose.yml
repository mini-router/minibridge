services:
  minibridge-host:
    build: .
    command:
      - minibridge
      - host
      - serve
      - --host
      - 0.0.0.0
      - --port
      - "7070"
      - --state-file
      - /data/minibridge-host-state.json
    ports:
      - "18080:7070"
    volumes:
      - ./configs:/config:ro
      - ./data:/data

  minibridge-web:
    build:
      context: ./web
    depends_on:
      - minibridge-host
    ports:
      - "5173:80"
